<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanbanito</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f1f5f9;
      --surface:      #ffffff;
      --surface-2:    #f8fafc;
      --border:       #e2e8f0;
      --border-focus: #6366f1;
      --text:         #0f172a;
      --text-2:       #475569;
      --text-3:       #94a3b8;
      --primary:      #6366f1;
      --primary-h:    #4f46e5;
      --danger:       #ef4444;
      --danger-bg:    #fee2e2;
      --warn:         #f59e0b;
      --success:      #10b981;
      --r:            8px;
      --r-sm:         5px;
      --shadow:       0 1px 2px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg:    0 4px 6px rgba(0,0,0,.05), 0 10px 15px rgba(0,0,0,.04);
      --shadow-xl:    0 20px 40px rgba(0,0,0,.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      background: #1e293b;
      color: #f8fafc;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo-icon { font-size: 20px; }
    .logo em { color: #818cf8; font-style: normal; }

    .board-title {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
      flex: 1;
    }

    .header-actions { display: flex; align-items: center; gap: 10px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #64748b;
      transition: background .3s;
      flex-shrink: 0;
    }
    .status-dot.live    { background: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,.2); }
    .status-dot.offline { background: #f59e0b; }
    .status-dot.error   { background: #ef4444; }

    .status-text { font-size: 12px; color: #64748b; }

    .header-btn {
      height: 30px;
      padding: 0 12px;
      border-radius: var(--r-sm);
      border: 1px solid #334155;
      background: transparent;
      color: #cbd5e1;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .15s, color .15s;
    }
    .header-btn:hover { background: #334155; color: #f1f5f9; }

    /* ── Board Layout ────────────────────────────── */
    .board-wrap {
      flex: 1;
      overflow-x: auto;
      padding: 20px;
      display: flex;
      align-items: flex-start;
    }

    .board {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      min-height: 200px;
    }

    /* ── Column ──────────────────────────────────── */
    .col {
      width: 272px;
      flex-shrink: 0;
      background: var(--surface-2);
      border-radius: var(--r);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 52px - 40px);
      animation: fadeSlideIn .18s ease both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .col-header {
      padding: 10px 12px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .col-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .col-name {
      font-weight: 600;
      font-size: 13px;
      flex: 1;
    }

    .col-count {
      font-size: 11px;
      background: var(--border);
      color: var(--text-3);
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
    }

    .col-add-btn {
      width: 26px; height: 26px;
      border: none;
      background: transparent;
      border-radius: var(--r-sm);
      cursor: pointer;
      color: var(--text-3);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background .12s, color .12s;
      flex-shrink: 0;
    }
    .col-add-btn:hover { background: var(--border); color: var(--text); }

    /* ── Cards area ──────────────────────────────── */
    .cards-area {
      padding: 8px;
      overflow-y: auto;
      flex: 1;
      min-height: 60px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .cards-area::-webkit-scrollbar { width: 4px; }
    .cards-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cards-area.drop-target {
      background: rgba(99,102,241,.05);
      border-radius: var(--r-sm);
      outline: 2px dashed rgba(99,102,241,.3);
      outline-offset: -2px;
    }

    .empty-hint {
      text-align: center;
      padding: 20px 8px;
      color: var(--text-3);
      font-size: 12px;
      user-select: none;
    }

    /* ── Card ────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--r-sm);
      padding: 10px 11px 9px 14px;
      margin-bottom: 7px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      position: relative;
      transition: box-shadow .15s, transform .12s;
      animation: cardIn .14s ease both;
      user-select: none;
    }
    .card:last-child { margin-bottom: 0; }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(.98); }
      to   { opacity: 1; transform: scale(1);   }
    }

    .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .card.dragging { opacity: .4; transform: rotate(1.5deg) scale(.98); }

    .card-accent {
      position: absolute;
      left: 0; top: 4px; bottom: 4px;
      width: 3px;
      border-radius: 2px;
    }
    .p-high   .card-accent { background: var(--danger); }
    .p-medium .card-accent { background: var(--warn); }
    .p-low    .card-accent { background: var(--success); }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 7px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .card-id {
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: var(--text-3);
      margin-right: 2px;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 8px;
    }
    .badge-high   { background: #fee2e2; color: #dc2626; }
    .badge-medium { background: #fef3c7; color: #b45309; }
    .badge-low    { background: #dcfce7; color: #16a34a; }

    .card-tag {
      font-size: 11px;
      background: var(--bg);
      color: var(--text-2);
      padding: 1px 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .card-assignee {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      margin-left: auto;
    }

    /* ── Add-card inline form ────────────────────── */
    .add-card-form {
      padding: 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .add-card-form textarea {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      background: var(--surface);
      color: var(--text);
      transition: border-color .15s;
    }
    .add-card-form textarea:focus { border-color: var(--border-focus); }

    .add-card-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      padding: 6px 13px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      line-height: 1;
      transition: background .12s, opacity .12s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }

    .btn-ghost { background: transparent; color: var(--text-2); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }

    .btn-danger-soft { background: var(--danger-bg); color: var(--danger); }
    .btn-danger-soft:hover { background: #fecaca; }

    .btn-sm { padding: 4px 9px; font-size: 12px; }

    /* ── Modal ───────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
      backdrop-filter: blur(2px);
      animation: overlayIn .15s ease;
    }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border-radius: 12px;
      width: 100%;
      max-width: 540px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      animation: modalIn .18s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1)  translateY(0);    }
    }

    .modal-head {
      padding: 18px 18px 0;
      display: flex;
      gap: 10px;
    }

    .modal-title-input {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      padding: 0 0 8px;
      border-bottom: 2px solid var(--border);
      transition: border-color .15s;
    }
    .modal-title-input:focus { border-bottom-color: var(--primary); }

    .modal-close {
      width: 30px; height: 30px;
      border: none;
      background: var(--bg);
      border-radius: var(--r-sm);
      cursor: pointer;
      color: var(--text-2);
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .12s;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-body { padding: 14px 18px; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
      margin-bottom: 14px;
    }
    @media (max-width: 480px) { .field-row { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 4px; }

    .field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .field select,
    .field input[type=text] {
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .field select:focus,
    .field input[type=text]:focus { border-color: var(--border-focus); }

    .body-editor {
      width: 100%;
      min-height: 110px;
      padding: 9px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      resize: vertical;
      outline: none;
      color: var(--text);
      line-height: 1.6;
      background: var(--surface-2);
      transition: border-color .15s;
    }
    .body-editor:focus { border-color: var(--border-focus); }

    .modal-foot {
      padding: 12px 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .modal-meta {
      font-size: 11px;
      color: var(--text-3);
    }

    /* ── Toast ───────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #1e293b;
      color: #f8fafc;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 500;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Static snapshot banner ──────────────────── */
    .snapshot-banner {
      background: #fffbeb;
      border-bottom: 1px solid #fde68a;
      padding: 10px 20px;
      font-size: 13px;
      color: #78350f;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .snapshot-banner code {
      background: #fef3c7;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    /* ── Offline / loading ───────────────────────── */
    .center-msg {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-3);
      padding: 40px;
    }
    .center-msg h2 { font-size: 16px; color: var(--text-2); }
    .center-msg p  { font-size: 13px; text-align: center; max-width: 400px; }
    .center-msg code { background: var(--border); padding: 1px 6px; border-radius: 4px; }

    /* ── Priority ring on card drag-over placeholder ── */
    .drop-placeholder {
      height: 54px;
      border: 2px dashed var(--primary);
      border-radius: var(--r-sm);
      margin-bottom: 7px;
      background: rgba(99,102,241,.04);
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 600px) {
      .board { flex-direction: column; }
      .col   { width: 100%; max-height: none; }
    }
  </style>
</head>
<body>

<div id="root"></div>
<div id="modal-root"></div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════
let state = {
  board: null,
  cards: [],
  loading: true,
  mode: 'server', // 'server' | 'static'
  status: 'connecting', // 'live' | 'offline' | 'error'
};

let draggingId = null;
let es = null; // EventSource

// ══════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ══════════════════════════════════════════════════════════
//  Load
// ══════════════════════════════════════════════════════════
async function load() {
  // Check if we have static data embedded (export mode)
  if (window.__KANBANITO__) {
    state.board  = window.__KANBANITO__.board;
    state.cards  = window.__KANBANITO__.cards;
    state.mode   = 'static';
    state.status = 'offline';
    state.loading = false;
    render();
    return;
  }

  try {
    const [board, cards] = await Promise.all([
      api('GET', '/api/board'),
      api('GET', '/api/cards'),
    ]);
    state.board   = board;
    state.cards   = cards;
    state.loading = false;
    state.status  = 'live';
    render();
    connectSSE();
  } catch (e) {
    state.loading = false;
    state.status  = 'error';
    render();
  }
}

function connectSSE() {
  es = new EventSource('/api/events');
  es.onopen  = () => { state.status = 'live'; renderHeader(); };
  es.onerror = () => { state.status = 'offline'; renderHeader(); };

  es.addEventListener('card:created', e => {
    const c = JSON.parse(e.data);
    if (!state.cards.find(x => x.id === c.id)) state.cards.push(c);
    render();
  });
  es.addEventListener('card:updated', e => {
    const c = JSON.parse(e.data);
    const i = state.cards.findIndex(x => x.id === c.id);
    if (i >= 0) state.cards[i] = c; else state.cards.push(c);
    render();
  });
  es.addEventListener('card:deleted', e => {
    const { id } = JSON.parse(e.data);
    state.cards = state.cards.filter(c => c.id !== id);
    render();
  });
  es.addEventListener('board:refresh', e => {
    const { cards } = JSON.parse(e.data);
    state.cards = cards;
    render();
  });
}

// ══════════════════════════════════════════════════════════
//  Render helpers
// ══════════════════════════════════════════════════════════
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderHeader() {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (!dot) return;
  dot.className  = `status-dot ${state.status}`;
  const labels = { live: 'live', offline: 'offline', connecting: 'connecting', error: 'server offline' };
  text.textContent = labels[state.status] || state.status;
}

// ══════════════════════════════════════════════════════════
//  Full render
// ══════════════════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');

  if (state.loading) {
    root.innerHTML = `
      <div class="header">
        <div class="logo"><span class="logo-icon">📋</span> Kanban<em>ito</em></div>
      </div>
      <div class="center-msg"><p>Loading board…</p></div>`;
    return;
  }

  if (state.status === 'error' && !state.board) {
    root.innerHTML = `
      <div class="header">
        <div class="logo"><span class="logo-icon">📋</span> Kanban<em>ito</em></div>
      </div>
      <div class="center-msg">
        <h2>Server not running</h2>
        <p>Start the server to use the live board:</p>
        <p><code>kanbanito serve</code></p>
        <p style="margin-top:12px;font-size:12px">Or export a static snapshot with <code>kanbanito export</code></p>
      </div>`;
    return;
  }

  const { board, cards } = state;

  root.innerHTML = `
    <div class="header">
      <div class="logo"><span class="logo-icon">📋</span> Kanban<em>ito</em></div>
      <div class="board-title">${esc(board.name)}</div>
      <div class="header-actions">
        ${state.mode === 'static' ? '' : `
          <div class="status-dot ${state.status}" id="status-dot"></div>
          <span class="status-text" id="status-text">${state.status}</span>
        `}
        ${state.mode === 'static' ? `<span style="font-size:12px;color:#94a3b8">snapshot · read-only</span>` : ''}
      </div>
    </div>
    ${state.mode === 'static' ? `
      <div class="snapshot-banner">
        📸 This is a static snapshot. Run <code>kanbanito serve</code> for the live interactive board.
      </div>` : ''}
    <div class="board-wrap">
      <div class="board" id="board">
        ${board.columns.map(col => renderColumn(col, cards)).join('')}
      </div>
    </div>`;

  if (state.mode === 'server') attachEvents();
}

function renderColumn(col, allCards) {
  const colCards = allCards.filter(c => c.column === col.id);
  const interactive = state.mode === 'server';
  return `
    <div class="col" data-col="${esc(col.id)}">
      <div class="col-header">
        <div class="col-dot" style="background:${esc(col.color)}"></div>
        <span class="col-name">${esc(col.name)}</span>
        <span class="col-count">${colCards.length}</span>
        ${interactive ? `<button class="col-add-btn" data-add="${esc(col.id)}" title="Add card">+</button>` : ''}
      </div>
      <div class="cards-area" data-drop-col="${esc(col.id)}">
        ${colCards.length === 0 ? '<div class="empty-hint">Drop cards here</div>' : ''}
        ${colCards.map(c => renderCard(c, interactive)).join('')}
      </div>
    </div>`;
}

function renderCard(card, interactive = true) {
  const p = card.priority || 'medium';
  const tags = Array.isArray(card.tags) ? card.tags : (card.tags ? String(card.tags).split(',').map(t=>t.trim()) : []);
  return `
    <div class="card p-${esc(p)}" data-card="${esc(card.id)}" ${interactive ? 'draggable="true"' : ''}>
      <div class="card-accent"></div>
      <div class="card-title">${esc(card.title)}</div>
      <div class="card-footer">
        <span class="card-id">${esc(card.id)}</span>
        <span class="badge badge-${esc(p)}">${esc(p)}</span>
        ${tags.slice(0,3).map(t => `<span class="card-tag">${esc(t)}</span>`).join('')}
        ${card.assignee ? `<span class="card-assignee">@${esc(card.assignee)}</span>` : ''}
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════
//  Event delegation
// ══════════════════════════════════════════════════════════
function attachEvents() {
  const board = document.getElementById('board');
  if (!board) return;

  // Add card button
  board.addEventListener('click', e => {
    const addBtn = e.target.closest('[data-add]');
    if (addBtn) { toggleAddForm(addBtn.dataset.add); return; }

    const card = e.target.closest('[data-card]');
    if (card) openModal(card.dataset.card);
  });

  // Drag and drop
  board.addEventListener('dragstart', e => {
    const card = e.target.closest('[data-card]');
    if (!card) return;
    draggingId = card.dataset.card;
    setTimeout(() => card.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });

  board.addEventListener('dragend', e => {
    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
    draggingId = null;
  });

  board.addEventListener('dragover', e => {
    const area = e.target.closest('[data-drop-col]');
    if (area) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.drop-target').forEach(el => {
        if (el !== area) el.classList.remove('drop-target');
      });
      area.classList.add('drop-target');
    }
  });

  board.addEventListener('dragleave', e => {
    const area = e.target.closest('[data-drop-col]');
    if (area && !area.contains(e.relatedTarget)) area.classList.remove('drop-target');
  });

  board.addEventListener('drop', async e => {
    const area = e.target.closest('[data-drop-col]');
    if (!area || !draggingId) return;
    e.preventDefault();
    area.classList.remove('drop-target');
    const targetCol = area.dataset.dropCol;
    const card = state.cards.find(c => c.id === draggingId);
    if (!card || card.column === targetCol) return;

    try {
      const updated = await api('PUT', `/api/cards/${draggingId}`, { column: targetCol });
      const i = state.cards.findIndex(c => c.id === draggingId);
      if (i >= 0) state.cards[i] = updated;
      render();
      showToast(`Moved to ${state.board.columns.find(c=>c.id===targetCol)?.name || targetCol}`);
    } catch (err) {
      showToast('Failed to move card');
    }
  });
}

// ══════════════════════════════════════════════════════════
//  Add card inline form
// ══════════════════════════════════════════════════════════
function toggleAddForm(colId) {
  // Close any existing form
  const existing = document.querySelector('.add-card-form');
  if (existing) {
    const existingCol = existing.closest('[data-col]')?.dataset.col;
    existing.remove();
    if (existingCol === colId) return; // toggle off
  }

  const col = document.querySelector(`[data-col="${colId}"]`);
  if (!col) return;

  const form = document.createElement('div');
  form.className = 'add-card-form';
  form.innerHTML = `
    <textarea rows="2" placeholder="Card title…" id="nct-${colId}"></textarea>
    <div class="add-card-actions">
      <button class="btn btn-primary btn-sm" data-submit="${colId}">Add card</button>
      <button class="btn btn-ghost btn-sm" data-cancel>Cancel</button>
    </div>`;
  col.appendChild(form);

  const ta = form.querySelector('textarea');
  ta.focus();
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitNewCard(colId, ta.value); }
    if (e.key === 'Escape') form.remove();
  });

  form.querySelector('[data-submit]').addEventListener('click', () => submitNewCard(colId, ta.value));
  form.querySelector('[data-cancel]').addEventListener('click', () => form.remove());
}

async function submitNewCard(colId, title) {
  title = (title || '').trim();
  if (!title) return;
  try {
    const card = await api('POST', '/api/cards', { title, column: colId });
    state.cards.push(card);
    render();
    showToast(`Created ${card.id}`);
  } catch (e) {
    showToast('Failed to create card');
  }
}

// ══════════════════════════════════════════════════════════
//  Card modal
// ══════════════════════════════════════════════════════════
function openModal(cardId) {
  const card = state.cards.find(c => c.id === cardId);
  if (!card) return;

  const board = state.board;
  const tags  = Array.isArray(card.tags) ? card.tags.join(', ') : (card.tags || '');
  const colOpts = board.columns.map(col =>
    `<option value="${esc(col.id)}" ${card.column === col.id ? 'selected' : ''}>${esc(col.name)}</option>`
  ).join('');

  const created = card.created ? new Date(card.created).toLocaleDateString(undefined, {month:'short',day:'numeric',year:'numeric'}) : '';
  const updated = card.updated ? new Date(card.updated).toLocaleDateString(undefined, {month:'short',day:'numeric',year:'numeric'}) : '';
  const isStatic = state.mode === 'static';

  const modalRoot = document.getElementById('modal-root');
  modalRoot.innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <input class="modal-title-input" id="m-title" type="text"
            value="${esc(card.title)}" placeholder="Card title"
            ${isStatic ? 'readonly' : ''}>
          <button class="modal-close" id="m-close" title="Close">✕</button>
        </div>
        <div class="modal-body">
          <div class="field-row">
            <div class="field">
              <label>Column</label>
              <select id="m-col" ${isStatic ? 'disabled' : ''}>${colOpts}</select>
            </div>
            <div class="field">
              <label>Priority</label>
              <select id="m-priority" ${isStatic ? 'disabled' : ''}>
                ${['low','medium','high'].map(p =>
                  `<option value="${p}" ${card.priority===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`
                ).join('')}
              </select>
            </div>
            <div class="field">
              <label>Assignee</label>
              <input type="text" id="m-assignee" value="${esc(card.assignee||'')}" placeholder="@name"
                ${isStatic ? 'readonly' : ''}>
            </div>
            <div class="field">
              <label>Tags</label>
              <input type="text" id="m-tags" value="${esc(tags)}" placeholder="tag1, tag2"
                ${isStatic ? 'readonly' : ''}>
            </div>
          </div>
          <div class="field">
            <label>Description / Notes (markdown)</label>
            <textarea class="body-editor" id="m-body" rows="6"
              ${isStatic ? 'readonly' : ''}>${esc(card.body||'')}</textarea>
          </div>
        </div>
        <div class="modal-foot">
          <div class="modal-meta">
            ${esc(card.id)}${created ? ` · ${created}` : ''}${updated && updated !== created ? ` → ${updated}` : ''}
          </div>
          <div style="display:flex;gap:7px">
            ${isStatic ? '' : `
              <button class="btn btn-danger-soft btn-sm" id="m-delete">Delete</button>
              <button class="btn btn-ghost btn-sm" id="m-cancel">Cancel</button>
              <button class="btn btn-primary btn-sm" id="m-save">Save</button>
            `}
            ${isStatic ? `<button class="btn btn-ghost btn-sm" id="m-cancel">Close</button>` : ''}
          </div>
        </div>
      </div>
    </div>`;

  const overlay = document.getElementById('overlay');
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.getElementById('m-close').addEventListener('click', closeModal);
  document.getElementById('m-cancel').addEventListener('click', closeModal);

  if (!isStatic) {
    document.getElementById('m-save').addEventListener('click', () => saveCard(cardId));
    document.getElementById('m-delete').addEventListener('click', () => deleteCardModal(cardId));
  }
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

async function saveCard(cardId) {
  const title    = document.getElementById('m-title').value.trim();
  const column   = document.getElementById('m-col').value;
  const priority = document.getElementById('m-priority').value;
  const assignee = document.getElementById('m-assignee').value.trim();
  const tagsRaw  = document.getElementById('m-tags').value;
  const body     = document.getElementById('m-body').value;
  const tags     = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  try {
    const updated = await api('PUT', `/api/cards/${cardId}`, { title, column, priority, assignee, tags, body });
    const i = state.cards.findIndex(c => c.id === cardId);
    if (i >= 0) state.cards[i] = updated;
    closeModal();
    render();
    showToast('Saved');
  } catch (e) {
    showToast('Save failed: ' + e.message);
  }
}

async function deleteCardModal(cardId) {
  if (!confirm('Delete this card?')) return;
  try {
    await api('DELETE', `/api/cards/${cardId}`);
    state.cards = state.cards.filter(c => c.id !== cardId);
    closeModal();
    render();
    showToast('Deleted');
  } catch (e) {
    showToast('Delete failed: ' + e.message);
  }
}

// ══════════════════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════════════════
//  Keyboard
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ══════════════════════════════════════════════════════════
//  Boot
// ══════════════════════════════════════════════════════════
load();
</script>
</body>
</html>
